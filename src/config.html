<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration</title>
    <!-- Replaced CDN with local compiled CSS -->
    <link rel="stylesheet" href="./all.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans h-screen overflow-hidden flex flex-col transition-colors duration-400 select-none border border-gray-300 dark:border-gray-700 rounded-xl">
    
    <!-- Title Bar -->
    <div id="title-bar" class="w-full h-10 bg-gray-200/80 dark:bg-gray-800/80 backdrop-blur-md flex items-center justify-between px-4 border-b border-gray-300 dark:border-gray-700 z-50">
        <div class="font-semibold text-xs text-gray-600 dark:text-gray-300 tracking-wide uppercase">Settings</div>
        <div class="flex gap-2 no-drag">
            <button id="minimize-btn" class="w-3.5 h-3.5 rounded-full bg-yellow-400 hover:bg-yellow-500 transition-colors shadow-sm"></button>
            <button id="close-config-btn" class="w-3.5 h-3.5 rounded-full bg-red-500 hover:bg-red-600 transition-colors shadow-sm"></button>
        </div>
    </div>

    <!-- Main App Area -->
    <div class="flex flex-1 overflow-hidden relative backdrop-blur-sm bg-white/50 dark:bg-gray-900/50">
        
        <!-- Sidebar -->
        <div id="sidebar" class="w-40 bg-gray-50/80 dark:bg-gray-800/80 border-r border-gray-200 dark:border-gray-700 p-3 flex flex-col gap-1 z-10 no-drag backdrop-blur-md">
            <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all text-brand bg-brand/10 dark:bg-brand/20 shadow-sm" data-page="config-page">Details</button>
            <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700" data-page="custom-page">Customize</button>
            <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700" data-page="break-image-page">Break Img</button>
            <button class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 mt-auto" data-page="about-page">About</button>
        </div>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-6 pb-24 no-drag relative z-0">
            
            <!-- Page: Config -->
            <div class="page block" id="config-page">
                <h1 class="text-xl font-bold mb-5 dark:text-white">Class Details</h1>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Class</label>
                        <select id="edit-class" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Section</label>
                        <select id="edit-section" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all"></select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Total Strength</label>
                        <input type="number" id="edit-strength" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Present</label>
                        <input type="number" id="edit-present" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all">
                    </div>
                </div>

                <div class="mb-5 border-t border-gray-200 dark:border-gray-700 pt-4">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">Period</label>
                    <div id="edit-period-grid" class="grid grid-cols-3 gap-2"></div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-1 uppercase tracking-wider">Subject</label>
                    <select id="edit-subject" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all"></select>
                </div>

                <div class="p-4 bg-gray-50 dark:bg-gray-800/50 rounded-xl border border-gray-200 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-3">
                        <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Teacher Input</label>
                        <div class="flex bg-gray-200 dark:bg-gray-700 rounded-lg p-1 gap-1">
                            <label class="cursor-pointer">
                                <input type="radio" id="teacher-select-radio" name="teacher-method" value="select" class="peer hidden">
                                <span class="px-3 py-1 text-xs font-medium rounded-md peer-checked:bg-white dark:peer-checked:bg-gray-600 peer-checked:shadow-sm transition-all text-gray-600 dark:text-gray-300">Select</span>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" id="teacher-manual-radio" name="teacher-method" value="manual" class="peer hidden" checked>
                                <span class="px-3 py-1 text-xs font-medium rounded-md peer-checked:bg-white dark:peer-checked:bg-gray-600 peer-checked:shadow-sm transition-all text-gray-600 dark:text-gray-300">Manual</span>
                            </label>
                        </div>
                    </div>
                    <div id="teacher-select-group" class="hidden">
                        <select id="edit-teacher-select" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all"></select>
                    </div>
                    <div id="teacher-manual-group">
                        <input type="text" id="edit-teacher-manual" placeholder="Enter teacher name" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Page: Customize -->
            <div class="page hidden" id="custom-page">
                <h1 class="text-xl font-bold mb-5 dark:text-white">Theme Customization</h1>
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 p-4 shadow-sm">
                    <div id="theme-editor-container" class="flex flex-col gap-4"></div>
                </div>
            </div>

            <!-- Page: Break Image -->
            <div class="page hidden" id="break-image-page">
                <h1 class="text-xl font-bold mb-5 dark:text-white">Break Background</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">Select the wallpaper displayed during break periods.</p>
                <div id="break-image-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
            </div>

            <!-- Page: About -->
            <div class="page hidden" id="about-page">
                <div class="flex flex-col items-center justify-center text-center mt-10">
                    <div class="w-16 h-16 bg-brand rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-brand/40 mb-4">SV</div>
                    <h1 class="text-2xl font-bold dark:text-white mb-1">SchoolView</h1>
                    <p class="text-xs text-brand font-semibold tracking-widest uppercase mb-4">Version 2.0</p>
                    <p class="text-sm text-gray-600 dark:text-gray-400 max-w-xs mb-6">A sleek, modern desktop widget for managing and displaying real-time class details.</p>
                    <p class="text-xs text-gray-500 dark:text-gray-500">Made by KWE26 (Pritam) / Kiwi</p>
                </div>
            </div>

        </div>

        <!-- Sticky Bottom Action Bar -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gray-50/90 dark:bg-gray-800/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3 no-drag z-20 w-[calc(100%-160px)] ml-[160px]">
            <button id="cancel-btn" class="px-5 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 transition-all shadow-sm">Cancel</button>
            <button id="save-btn" class="px-5 py-2 rounded-lg text-sm font-semibold text-white bg-brand hover:bg-brandHover transition-all shadow-md shadow-brand/30">Save Changes</button>
        </div>
    </div>

    <script>
        const defaultSubjectColors = {
            'Maths': '#2980b9', 'Science': '#27ae60', 'Physics': '#2980b9', 'Chemistry': '#8e44ad',
            'Bio': '#16a085', 'English': '#c0392b', 'History': '#8e44ad', 'Geo': '#16a085',
            'Civics': '#d35400', 'Economics': '#e67e22', 'Social Science': '#795548', 'AI': '#2c3e50',
            'P.ED': '#5D6D7E', 'Library': '#34495e', 'Odia': '#006266', 'Hindi': '#9b59b6',
            'Break': '#4e54c8', 'Default': '#5D6D7E'
        };
        let subjectColors = {};
        let currentThemeState = {}; 
        
        const breakImages = [
            './assets/mitsuba.png', './assets/fly.png', './assets/flowera.png',
            './assets/ruby_a.png', './assets/ruby_b.png', './assets/star.png',
        ];

        const classes = ['VIII', 'IX', 'X'];
        const sections = ['A', 'B', 'C', 'D', 'E', 'F'];
        const subjects = Object.keys(defaultSubjectColors).filter(s => !['Break', 'Default'].includes(s)).concat('Break');
        const teacherList = ["Bijaylaxmi Mam", "Suren Sir", "Biswajit Sir", "Suvendu Sir", "Minati Mam", "Sarmistha Mam", "Ananya Mam", "Paresh Sir"];

        // Elements
        const els = {
            editClass: document.getElementById('edit-class'),
            editSection: document.getElementById('edit-section'),
            editStrength: document.getElementById('edit-strength'),
            editPresent: document.getElementById('edit-present'),
            editSubject: document.getElementById('edit-subject'),
            teacherSelRadio: document.getElementById('teacher-select-radio'),
            teacherManRadio: document.getElementById('teacher-manual-radio'),
            teacherSelGroup: document.getElementById('teacher-select-group'),
            teacherManGroup: document.getElementById('teacher-manual-group'),
            teacherSel: document.getElementById('edit-teacher-select'),
            teacherMan: document.getElementById('edit-teacher-manual'),
            themeEditor: document.getElementById('theme-editor-container')
        };

        function populateSelect(selectElement, optionsArray, selectedValue = null) {
            selectElement.innerHTML = optionsArray.map(opt => `<option value="${opt}">${opt}</option>`).join('');
            if (selectedValue) selectElement.value = selectedValue;
        }

        function createPeriodButtons() {
            const container = document.getElementById('edit-period-grid');
            const periods = ['1st', '2nd', '3rd', '4th', 'Break', '5th', '6th', '7th', '8th'];
            container.innerHTML = periods.map((p, i) => {
                const val = p === 'Break' ? 'Break' : `${p} Period`;
                return `
                    <label class="cursor-pointer relative">
                        <input type="radio" name="period-radio" value="${val}" class="peer sr-only" ${i===0?'checked':''}>
                        <div class="px-2 py-2 text-center text-xs font-bold rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 peer-checked:bg-brand peer-checked:border-brand peer-checked:text-white transition-all shadow-sm hover:bg-gray-50 dark:hover:bg-gray-700 peer-checked:shadow-brand/30">${p}</div>
                    </label>
                `;
            }).join('');
        }

        function createBreakImageSelector() {
            const container = document.getElementById('break-image-grid');
            container.innerHTML = breakImages.map((url, i) => `
                <label class="cursor-pointer relative group">
                    <input type="radio" name="break-image-radio" value="${url}" class="peer sr-only" ${i===0?'checked':''}>
                    <div class="rounded-xl border-2 border-transparent peer-checked:border-brand overflow-hidden transition-all peer-checked:shadow-md peer-checked:shadow-brand/20 relative">
                        <img src="${url}" class="w-full h-20 object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://placehold.co/150x80/1f2937/fff?text=No+Img'">
                        <div class="absolute inset-0 bg-brand/20 opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                    </div>
                </label>
            `).join('');
        }

        function getTextColor(hex) {
            if (!hex) return '#ffffff';
            hex = hex.replace("#", "");
            if (hex.length !== 6) return '#ffffff'; 
            const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#111827' : '#ffffff';
        }
        
        function darkenColor(hex, percent) {
            if (!hex) return '#000000';
            hex = hex.replace('#','');
            if (hex.length !== 6) return '#000000'; 
            let r = Math.max(0, Math.floor(parseInt(hex.substring(0,2), 16) * (100 - percent) / 100));
            let g = Math.max(0, Math.floor(parseInt(hex.substring(2,4), 16) * (100 - percent) / 100));
            let b = Math.max(0, Math.floor(parseInt(hex.substring(4,6), 16) * (100 - percent) / 100));
            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).padStart(6, '0')}`;
        }

        function updateConfigTheme(subject) {
            let theme = currentThemeState[subject] || { type: 'color', value: subjectColors[subject] || defaultSubjectColors[subject] || defaultSubjectColors['Default'] };
            if (subject === 'Break') theme = { type: 'color', value: subjectColors['Break'] || defaultSubjectColors['Break'] };

            const isDarkText = theme.type !== 'image' && getTextColor(theme.value) === '#111827';
            
            if (theme.type === 'image') {
                document.body.style.background = `url(${theme.value}) center center / cover no-repeat`;
                document.documentElement.classList.add('dark'); // Fallback to dark mode overlay for images
            } else {
                document.body.style.background = theme.value; 
                document.documentElement.classList.toggle('dark', !isDarkText);
            }
        }

        function loadAndApplyColors() {
            subjectColors = {}; currentThemeState = {};
            let html = '';
            
            Object.keys(defaultSubjectColors).filter(s => s !== 'Default').forEach(subject => {
                const savedColor = localStorage.getItem('schoolView-color-' + subject) || defaultSubjectColors[subject];
                subjectColors[subject] = savedColor;
                
                const savedThemeType = localStorage.getItem(`schoolView-themeType-${subject}`) || 'color';
                const savedThemeValue = savedThemeType === 'image' ? (localStorage.getItem(`schoolView-themeImage-${subject}`) || breakImages[0]) : savedColor;
                currentThemeState[subject] = { type: savedThemeType, value: savedThemeValue };

                const isImageChecked = savedThemeType === 'image';
                
                let controls = subject !== 'Break' ? `
                    <div class="flex items-center gap-3">
                        <input type="color" id="color-${subject}" value="${savedColor}" class="w-8 h-8 rounded-md cursor-pointer border border-gray-300 dark:border-gray-600 bg-transparent p-0.5" style="display: ${isImageChecked ? 'none' : 'block'};">
                        <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-600 dark:text-gray-300">
                            <input type="checkbox" id="image-toggle-${subject}" class="w-4 h-4 text-brand rounded focus:ring-brand accent-brand bg-gray-100 border-gray-300" ${isImageChecked ? 'checked' : ''}> Img
                        </label>
                    </div>
                ` : `<input type="color" id="color-${subject}" value="${savedColor}" class="w-8 h-8 rounded-md cursor-pointer border border-gray-300 dark:border-gray-600 bg-transparent p-0.5">`;

                let imgGrid = subject !== 'Break' ? `
                    <div id="image-select-container-${subject}" class="grid grid-cols-4 sm:grid-cols-6 gap-2 mt-3" style="display: ${isImageChecked ? 'grid' : 'none'};">
                        ${breakImages.map((url, i) => `
                            <label class="cursor-pointer group">
                                <input type="radio" name="subject-${subject}-image-radio" value="${url}" class="peer sr-only" ${url === savedThemeValue ? 'checked' : ''}>
                                <div class="rounded-lg border-2 border-transparent peer-checked:border-brand overflow-hidden transition-all">
                                    <img src="${url}" class="w-full h-10 object-cover opacity-80 group-hover:opacity-100 peer-checked:opacity-100" onerror="this.src='https://placehold.co/50/1f2937/fff?text=X'">
                                </div>
                            </label>
                        `).join('')}
                    </div>
                ` : '';

                html += `
                    <div class="border-b border-gray-100 dark:border-gray-700/50 pb-4 last:border-0 last:pb-0">
                        <div class="flex justify-between items-center">
                            <label class="font-semibold text-sm text-gray-700 dark:text-gray-200">${subject}</label>
                            ${controls}
                        </div>
                        ${imgGrid}
                        <p id="warning-${subject}" class="text-[0.65rem] text-red-500 font-semibold mt-1 hidden text-right">Adjusted for contrast.</p>
                    </div>
                `;
            });
            
            subjectColors['Default'] = localStorage.getItem('schoolView-color-Default') || defaultSubjectColors['Default'];
            els.themeEditor.innerHTML = html;
            
            // Attach Events
            Object.keys(defaultSubjectColors).filter(s => s !== 'Default').forEach(subject => {
                const colorInput = document.getElementById(`color-${subject}`);
                const warning = document.getElementById(`warning-${subject}`);
                
                colorInput.addEventListener('input', e => {
                    subjectColors[subject] = e.target.value; 
                    currentThemeState[subject] = { type: 'color', value: e.target.value };
                    if (els.editSubject.value === subject) updateConfigTheme(subject);
                });

                colorInput.addEventListener('change', e => {
                    let color = e.target.value;
                    if (getTextColor(color) === '#111827') {
                        color = darkenColor(color, 40);
                        e.target.value = color;
                        subjectColors[subject] = color; 
                        currentThemeState[subject] = { type: 'color', value: color };
                        if (els.editSubject.value === subject) updateConfigTheme(subject);
                        warning.style.display = 'block'; setTimeout(() => warning.style.display = 'none', 2000);
                    }
                });

                if (subject !== 'Break') {
                    const toggle = document.getElementById(`image-toggle-${subject}`);
                    const imgCont = document.getElementById(`image-select-container-${subject}`);
                    
                    imgCont.querySelectorAll('input[type="radio"]').forEach(rad => {
                        rad.addEventListener('change', e => {
                            if(e.target.checked) {
                                currentThemeState[subject] = { type: 'image', value: e.target.value };
                                if (els.editSubject.value === subject) updateConfigTheme(subject);
                            }
                        })
                    });

                    toggle.addEventListener('change', e => {
                        const useImg = e.target.checked;
                        colorInput.style.display = useImg ? 'none' : 'block';
                        imgCont.style.display = useImg ? 'grid' : 'none';
                        if (useImg) {
                            const sel = imgCont.querySelector('input:checked');
                            currentThemeState[subject] = { type: 'image', value: sel ? sel.value : breakImages[0] };
                        } else {
                            currentThemeState[subject] = { type: 'color', value: colorInput.value };
                        }
                        if (els.editSubject.value === subject) updateConfigTheme(subject);
                    });
                }
            });
        }

        function loadData() {
            loadAndApplyColors(); createPeriodButtons(); createBreakImageSelector();

            document.querySelectorAll('input[name="period-radio"]').forEach(r => r.addEventListener('change', () => {
                if(r.checked && r.value === 'Break') { els.editSubject.value = 'Break'; els.editSubject.dispatchEvent(new Event('change')); }
            }));

            populateSelect(els.editClass, classes); populateSelect(els.editSection, sections);
            populateSelect(els.editSubject, subjects); populateSelect(els.teacherSel, teacherList);
            
            els.editClass.value = localStorage.getItem('schoolView-class') || 'X';
            els.editSection.value = localStorage.getItem('schoolView-section') || 'D';
            els.editStrength.value = localStorage.getItem('schoolView-strength') || '39';
            els.editPresent.value = localStorage.getItem('schoolView-present') || '0';
            
            const savedPeriod = localStorage.getItem('schoolView-period') || '1st Period';
            const pr = document.querySelector(`input[name="period-radio"][value="${savedPeriod}"]`);
            if (pr) pr.checked = true;
            
            els.editSubject.value = localStorage.getItem('schoolView-subject') || 'Maths';
            
            const savedTeacher = localStorage.getItem('schoolView-teacher') || 'N/A';
            if (teacherList.includes(savedTeacher)) {
                els.teacherSel.value = savedTeacher; els.teacherSelRadio.checked = true;
                els.teacherSelGroup.classList.remove('hidden'); els.teacherManGroup.classList.add('hidden');
            } else {
                els.teacherMan.value = savedTeacher; els.teacherManRadio.checked = true;
                els.teacherSelGroup.classList.add('hidden'); els.teacherManGroup.classList.remove('hidden');
            }

            const savedBreakImg = localStorage.getItem('schoolView-breakImage') || breakImages[0];
            const brImg = document.querySelector(`input[name="break-image-radio"][value="${savedBreakImg}"]`);
            if (brImg) brImg.checked = true;
            
            updateConfigTheme(els.editSubject.value);
        }
        
        function handleSave() {
            const data = {
                class: els.editClass.value, section: els.editSection.value,
                strength: els.editStrength.value, present: els.editPresent.value,
                period: document.querySelector('input[name="period-radio"]:checked')?.value || '1st Period',
                subject: els.editSubject.value,
                teacher: els.teacherManRadio.checked ? els.teacherMan.value : els.teacherSel.value, 
            };

            Object.entries(currentThemeState).forEach(([sub, theme]) => {
                 localStorage.setItem(`schoolView-themeType-${sub}`, theme.type);
                 if (theme.type === 'image') {
                     localStorage.setItem(`schoolView-themeImage-${sub}`, theme.value);
                     const cInp = document.getElementById(`color-${sub}`);
                     localStorage.setItem(`schoolView-color-${sub}`, cInp ? cInp.value : (subjectColors['Break'] || defaultSubjectColors['Break'])); 
                 } else {
                     localStorage.setItem(`schoolView-color-${sub}`, theme.value);
                 }
            });

            localStorage.setItem('schoolView-breakImage', document.querySelector('input[name="break-image-radio"]:checked')?.value || breakImages[0]);
            window.api?.saveData(data);
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            // Navigation
            const navs = document.querySelectorAll('.nav-btn'), pages = document.querySelectorAll('.page');
            navs.forEach(btn => btn.addEventListener('click', () => {
                navs.forEach(b => { b.classList.remove('bg-brand/10', 'dark:bg-brand/20', 'text-brand', 'shadow-sm'); b.classList.add('text-gray-600', 'dark:text-gray-300'); });
                btn.classList.add('bg-brand/10', 'dark:bg-brand/20', 'text-brand', 'shadow-sm'); btn.classList.remove('text-gray-600', 'dark:text-gray-300');
                pages.forEach(p => p.classList.toggle('hidden', p.id !== btn.dataset.page));
                pages.forEach(p => p.classList.toggle('block', p.id === btn.dataset.page));
            }));

            // Events
            document.getElementById('save-btn').addEventListener('click', handleSave);
            document.getElementById('cancel-btn').addEventListener('click', () => window.api?.closeConfig());
            document.getElementById('minimize-btn').addEventListener('click', () => window.api?.minimizeConfig());
            document.getElementById('close-config-btn').addEventListener('click', () => window.api?.closeConfig());
            
            els.editSubject.addEventListener('change', e => updateConfigTheme(e.target.value));
            
            els.teacherSelRadio.addEventListener('change', () => { els.teacherSelGroup.classList.remove('hidden'); els.teacherManGroup.classList.add('hidden'); });
            els.teacherManRadio.addEventListener('change', () => { els.teacherSelGroup.classList.add('hidden'); els.teacherManGroup.classList.remove('hidden'); });
        });
    </script>
</body>
</html>

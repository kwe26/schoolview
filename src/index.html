<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolView</title>
    <link rel="stylesheet" href="./all.css" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { -webkit-app-region: drag; }
        button, input, select { -webkit-app-region: no-drag; }
    </style>
</head>
<body class="bg-transparent font-sans p-3 select-none h-screen overflow-hidden text-white flex flex-col antialiased">
    
    <div id="widget-container" class="relative w-full h-full rounded-2xl shadow-2xl p-4 flex flex-col overflow-hidden transition-all duration-500 ease-in-out z-10 border border-white/10 backdrop-blur-md">
        
        <!-- Background Layer -->
        <div id="bg-layer" class="absolute inset-0 -z-10 bg-cover bg-center opacity-0 transition-opacity duration-500 ease-in-out"></div>
        <div id="bg-overlay" class="absolute inset-0 -z-10 bg-black/40 opacity-0 transition-opacity duration-500 ease-in-out"></div>

        <!-- Header: Close Button & Date -->
        <div class="flex justify-between items-start mb-2">
            <div id="view-date" class="text-xs font-semibold uppercase tracking-widest opacity-80 mt-1"></div>
            <button id="close-btn" title="Close" class="w-6 h-6 bg-white/10 hover:bg-red-500 text-white rounded-full text-xs font-bold flex items-center justify-center cursor-pointer transition-colors duration-200 z-[100] backdrop-blur-sm">
                ✕
            </button>
        </div>

        <!-- Clock Section -->
        <div class="flex items-baseline justify-center gap-1.5 mb-5 drop-shadow-md">
            <div id="digital-clock" class="text-5xl font-extrabold tracking-tighter tabular-nums">00:00:00</div>
            <div id="digital-ampm" class="text-lg font-bold opacity-90">AM</div>
        </div>

        <div id="view-mode" class="flex flex-col gap-3 h-full">
            <!-- Subject Bento Box -->
            <div class="bento-box bg-white/10 rounded-xl p-3 backdrop-blur-sm border border-white/5 transition-colors duration-300">
                <div class="flex justify-between items-center mb-1">
                    <div id="view-period" class="text-xs font-semibold uppercase tracking-wider opacity-75"></div>
                    <div class="text-[0.65rem] font-bold bg-white/20 px-2 py-0.5 rounded-full" id="view-class-badge">Class <span id="view-class"></span>-<span id="view-section"></span></div>
                </div>
                <div id="view-subject" class="text-2xl font-bold leading-tight truncate drop-shadow-sm mb-1"></div>
                <div class="text-xs font-medium opacity-85 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span id="view-teacher"></span>
                </div>
            </div>

            <!-- Stats Bento Grid -->
            <div class="grid grid-cols-3 gap-2 mt-auto mb-4">
                <div class="bento-box bg-white/10 rounded-xl p-2 flex flex-col items-center justify-center backdrop-blur-sm border border-white/5">
                    <span class="text-[0.65rem] font-semibold uppercase opacity-70 mb-0.5">Total</span>
                    <span id="view-strength" class="text-lg font-bold"></span>
                </div>
                <div class="bento-box bg-white/10 rounded-xl p-2 flex flex-col items-center justify-center backdrop-blur-sm border border-white/5">
                    <span class="text-[0.65rem] font-semibold uppercase opacity-70 mb-0.5 text-green-300">Present</span>
                    <span id="view-present" class="text-lg font-bold"></span>
                </div>
                <div class="bento-box bg-white/10 rounded-xl p-2 flex flex-col items-center justify-center backdrop-blur-sm border border-white/5">
                    <span class="text-[0.65rem] font-semibold uppercase opacity-70 mb-0.5 text-red-300">Absent</span>
                    <span id="view-absent" class="text-lg font-bold"></span>
                </div>
            </div>
            
            <!-- Break Mode Full Screen Replacement -->
            <div id="break-text" class="hidden absolute inset-0 flex items-center justify-center text-4xl font-black text-white drop-shadow-[0_4px_8px_rgba(0,0,0,0.4)] z-20 backdrop-blur-sm bg-black/20 rounded-2xl">
                Break Time!
            </div>
        </div>

        <!-- Button Bar -->
        <button id="edit-config-btn" class="w-full bg-brand hover:bg-brandHover text-white py-2.5 px-4 rounded-xl cursor-pointer text-sm font-bold shadow-lg shadow-brand/30 transition-all duration-200 active:scale-[0.98] z-30 flex justify-center items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            Edit / Config
        </button>
    </div>

    <script>
        const defaultSubjectColors = {
            'Maths': '#2980b9', 'Science': '#27ae60', 'Physics': '#2980b9', 'Chemistry': '#8e44ad',
            'Bio': '#16a085', 'English': '#c0392b', 'History': '#8e44ad', 'Geo': '#16a085',
            'Civics': '#d35400', 'Economics': '#e67e22', 'Social Science': '#795548', 'AI': '#2c3e50',
            'P.ED': '#5D6D7E', 'Library': '#34495e', 'Odia': '#006266', 'Hindi': '#9b59b6',
            'Break': '#4e54c8', 'Default': '#5D6D7E'
        };
        let subjectColors = {};

        const elements = {
            container: document.getElementById('widget-container'),
            bgLayer: document.getElementById('bg-layer'),
            bgOverlay: document.getElementById('bg-overlay'),
            viewMode: document.getElementById('view-mode'),
            breakText: document.getElementById('break-text'),
            clock: document.getElementById('digital-clock'),
            ampm: document.getElementById('digital-ampm'),
            date: document.getElementById('view-date'),
            class: document.getElementById('view-class'),
            section: document.getElementById('view-section'),
            strength: document.getElementById('view-strength'),
            present: document.getElementById('view-present'),
            absent: document.getElementById('view-absent'),
            period: document.getElementById('view-period'),
            subject: document.getElementById('view-subject'),
            teacher: document.getElementById('view-teacher')
        };

        function getTextColor(hex) {
            hex = hex.replace("#", "");
            if(hex.length !== 6) return '#ffffff';
            const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#111827' : '#ffffff';
        }
        
        function loadAndApplyColors() {
            subjectColors = {};
            for (const subject in defaultSubjectColors) {
                subjectColors[subject] = localStorage.getItem('schoolView-color-' + subject) || defaultSubjectColors[subject];
            }
        }

        function updateTheme(subject) {
            loadAndApplyColors();
            const themeType = localStorage.getItem(`schoolView-themeType-${subject}`) || 'color';
            let breakImgUrl = subject === 'Break' ? localStorage.getItem('schoolView-breakImage') || '' 
                            : (themeType === 'image' ? localStorage.getItem(`schoolView-themeImage-${subject}`) || '' : '');

            const bentoBoxes = document.querySelectorAll('.bento-box');

            if ((subject === 'Break' || themeType === 'image') && breakImgUrl) {
                elements.container.style.backgroundColor = 'transparent';
                elements.container.style.color = '#ffffff';
                elements.bgLayer.style.backgroundImage = `url("${breakImgUrl}")`;
                elements.bgLayer.style.opacity = '1';
                elements.bgOverlay.style.opacity = '1';
                
                bentoBoxes.forEach(box => {
                    box.classList.remove('bg-black/10', 'border-black/5');
                    box.classList.add('bg-white/10', 'border-white/5', 'backdrop-blur-md');
                });
            } else {
                const color = subjectColors[subject] || subjectColors['Default'];
                const textColor = getTextColor(color);
                
                elements.container.style.backgroundColor = color;
                elements.container.style.color = textColor;
                elements.bgLayer.style.backgroundImage = 'none';
                elements.bgLayer.style.opacity = '0';
                elements.bgOverlay.style.opacity = '0';

                const isDarkText = textColor === '#111827';
                bentoBoxes.forEach(box => {
                    if(isDarkText) {
                        box.classList.remove('bg-white/10', 'border-white/5');
                        box.classList.add('bg-black/10', 'border-black/5', 'shadow-sm');
                    } else {
                        box.classList.remove('bg-black/10', 'border-black/5', 'shadow-sm');
                        box.classList.add('bg-white/10', 'border-white/5');
                    }
                });
            }

            Array.from(elements.viewMode.children).forEach(child => {
                if(child.id !== 'break-text') child.style.display = subject === 'Break' ? 'none' : '';
            });
            elements.breakText.style.display = subject === 'Break' ? 'flex' : 'none';
        }

        function loadData() {
            loadAndApplyColors(); 
            const data = {
                class: localStorage.getItem('schoolView-class') || 'X',
                section: localStorage.getItem('schoolView-section') || 'D',
                strength: localStorage.getItem('schoolView-strength') || '39',
                present: localStorage.getItem('schoolView-present') || '0', 
                period: localStorage.getItem('schoolView-period') || '1st Period',
                subject: localStorage.getItem('schoolView-subject') || 'Maths', 
                teacher: localStorage.getItem('schoolView-teacher') || 'N/A', 
            };

            elements.date.textContent = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            updateViewFields(data);
        }

        function updateViewFields(data) {
            elements.class.textContent = data.class;
            elements.section.textContent = data.section;
            elements.strength.textContent = data.strength;
            elements.present.textContent = data.present;
            elements.absent.textContent = (parseInt(data.strength) || 0) - (parseInt(data.present) || 0);
            elements.period.textContent = data.period;
            elements.subject.textContent = data.subject;
            elements.teacher.textContent = data.teacher;
            updateTheme(data.subject);
        }
        
        function setClock() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            elements.ampm.textContent = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            elements.clock.textContent = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadData(); setClock(); setInterval(setClock, 1000); 
        });

        document.getElementById('close-btn').addEventListener('click', () => window.api?.closeApp());
        document.getElementById('edit-config-btn').addEventListener('click', () => window.api?.openConfig());
        
        if (window.api?.onDataUpdated) {
            window.api.onDataUpdated((data) => {
                Object.entries(data).forEach(([k,v]) => localStorage.setItem(`schoolView-${k}`, v));
                loadAndApplyColors(); updateViewFields(data);
            });
        }
    </script>
</body>
</html>
